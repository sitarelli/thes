<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Icarous</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ICAROUS">
    <meta name="theme-color" content="#000000">

    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- OVERLAY ROTAZIONE -->
<div id="rotate-message" class="rotate-overlay">
    <div class="rotate-content">
        <div class="rotate-icon">📱</div>
        <p>Per giocare a schermo intero <br> su IPHONE: <br><br> clicca su: <br><br> ... Condividi <br><br> Altro <br><br> Aggiungi alla schermata Home <br><br> Lancia il gioco da icona</p>
    </div>
</div>

<!-- TAP TO START -->
<div id="tap-to-start" class="tap-overlay">
    <div class="tap-content">
        <div class="tap-title">ICAROUS</div>
        <div class="tap-subtitle">An MSX game Revival</div>
        <div class="tap-button">TAP TO START</div>
        <div class="tap-hint">Usa il tasto fullscreen se disponibile</div>
        <div class="tap-debug" id="debug-info">Caricamento...</div>
    </div>
</div>

<!-- POWER BAR -->
<div class="power-container">
    <div id="power-bar"></div>
</div>

<!-- GAME OVER OVERLAY -->
<div id="game-over-overlay">
    <div class="game-over-box">
        <div class="game-over-text">GAME OVER</div>
        <button class="game-over-btn" id="retry-btn">RIPROVA</button>
    </div>
</div>

<!-- CONTENITORE GIOCO -->
<div id="game-container">

    <!-- HEADER / HUD -->
    <div class="compact-header">
        <div class="title-compact">ICAROUS</div>

        <div id="hud-compact">
            <!-- ZOOM CONTROLS: Design minimale ed elegante -->
            <div class="hud-item zoom-area">
                <button id="btn-zoom-out" class="zoom-btn">−</button>
                <span class="zoom-icon">🔍</span>
                <button id="btn-zoom-in" class="zoom-btn">+</button>
            </div>

            <div class="hud-item">
                <span class="hud-label">LV</span>
                <span class="hud-value" id="level-display">01</span>
            </div>

            <div class="hud-item">
                <span class="hud-icon">⭐</span>
                <span class="hud-value" id="stars-display">0</span>
            </div>

            <div class="hud-item">
                <span class="flag-indicator"></span>
            </div>

            <div class="hud-item">
                <span class="hud-icon">💡</span>
                <span class="hud-value" id="bulbs-display">0</span>
            </div>

            <div class="hud-item">
                <span class="key-indicator"></span>
            </div>
        </div>
    </div>

    <!-- CANVAS -->
    <div class="game-wrapper">
        <canvas id="game-canvas"></canvas>
    </div>

<!-- TOUCH CONTROLS -->
<div id="touch-controls">
    <div class="controls-left">
        <div id="joystick-base">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <div class="controls-right">
        <button id="btn-fly" class="touch-btn fly-btn" type="button">
            <span class="fly-icon">FLY</span>
        </button>
    </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
