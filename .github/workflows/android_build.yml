name: Build Android APK
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Creiamo un package.json base se non esiste, per evitare errori di npm
      - name: Prepara ambiente
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi

      - name: Installazione dipendenze e Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Inizializza Capacitor e Android
        run: |
          # Usiamo --confirm per saltare i prompt interattivi
          npx cap init "MioGioco" "com.esempio.gioco" --web-dir .
          npx cap add android
          npx cap copy android

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Carica APK come Artefatto
        uses: actions/upload-artifact@v4
        with:
          name: gioco-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
